services:

  jupyter:
    image: docker.io/jupyter/datascience-notebook:latest
    container_name: ${COMPOSE_PROJECT_NAME:-data}-jupyter
    ports:
      - "8888:8888"     # Notebook — http://localhost:8888?token=devtoken
    volumes:
      - .:/home/jovyan/work:Z     # notebooks saved locally
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-devtoken}
    restart: unless-stopped

  postgres:
    image: docker.io/postgres:16
    container_name: ${COMPOSE_PROJECT_NAME:-data}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-datasets}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-data}-minio
    ports:
      - "9000:9000"     # S3-compatible API
      - "9001:9001"     # Web console — http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:

# ── Access ────────────────────────────────────────────────────────────────────
# Jupyter  → http://localhost:8888?token=devtoken
# Postgres → localhost:5432  (user: dev, pass: devpass, db: datasets)
# MinIO    → http://localhost:9001  (minioadmin / minioadmin)
#
# Connect to Postgres from a notebook:
#   import psycopg2
#   conn = psycopg2.connect("host=postgres user=dev password=devpass dbname=datasets")
