services:

  postgres:
    image: docker.io/postgres:16
    container_name: ${COMPOSE_PROJECT_NAME:-webapi}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: docker.io/redis:7
    container_name: ${COMPOSE_PROJECT_NAME:-webapi}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: docker.io/mailhog/mailhog:latest
    container_name: ${COMPOSE_PROJECT_NAME:-webapi}-mailhog
    ports:
      - "1025:1025"   # SMTP — point your app here
      - "8025:8025"   # Web UI — http://localhost:8025
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

# ── Access ────────────────────────────────────────────────────────────────────
# Postgres  → localhost:5432  (user: dev, pass: devpass, db: mydb)
# Redis     → localhost:6379
# MailHog   → http://localhost:8025
