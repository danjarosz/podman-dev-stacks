services:

  postgres:
    image: docker.io/postgres:16
    container_name: ${COMPOSE_PROJECT_NAME:-micro}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: docker.io/confluentinc/cp-zookeeper:latest
    container_name: ${COMPOSE_PROJECT_NAME:-micro}-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: docker.io/confluentinc/cp-kafka:latest
    container_name: ${COMPOSE_PROJECT_NAME:-micro}-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    container_name: ${COMPOSE_PROJECT_NAME:-micro}-jaeger
    ports:
      - "6831:6831/udp"   # Thrift compact — send traces here
      - "16686:16686"     # UI — http://localhost:16686
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-micro}-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-micro}-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

# ── Access ────────────────────────────────────────────────────────────────────
# Postgres   → localhost:5432  (user: dev, pass: devpass, db: mydb)
# Kafka      → localhost:9092
# Jaeger UI  → http://localhost:16686
# Prometheus → http://localhost:9090
# Grafana    → http://localhost:3000  (admin / admin)
