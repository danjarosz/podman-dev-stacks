services:

  localstack:
    image: docker.io/localstack/localstack:latest
    container_name: ${COMPOSE_PROJECT_NAME:-cloud}-localstack
    ports:
      - "4566:4566"     # All AWS services on one port
    environment:
      - SERVICES=${LOCALSTACK_SERVICES:-s3,sqs,sns,lambda,dynamodb,secretsmanager,iam}
      - DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - DEBUG=${LOCALSTACK_DEBUG:-0}
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock:Z
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-cloud}-minio
    ports:
      - "9000:9000"     # S3-compatible API
      - "9001:9001"     # Web console — http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  localstack-data:
  minio-data:

# ── Access ────────────────────────────────────────────────────────────────────
# LocalStack → http://localhost:4566  (all AWS services)
# MinIO API  → http://localhost:9000  (S3-compatible)
# MinIO UI   → http://localhost:9001  (minioadmin / minioadmin)
#
# Use AWS CLI pointed at LocalStack:
#   aws --endpoint-url=http://localhost:4566 s3 mb s3://my-bucket
#   aws --endpoint-url=http://localhost:4566 s3 ls
#
# Use AWS CLI pointed at MinIO:
#   aws --endpoint-url=http://localhost:9000 s3 mb s3://my-bucket
