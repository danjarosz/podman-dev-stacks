
  app:
    image: docker.io/golang:1.23
    container_name: ${COMPOSE_PROJECT_NAME:-app}-go
    working_dir: /app
    volumes:
      - .:/app:Z
      - go-cache:/root/.cache/go-build
      - go-modules:/go/pkg/mod
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - CGO_ENABLED=0
      - GOOS=linux
    command: go run ./cmd/main.go
