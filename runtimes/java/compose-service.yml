
  app:
    image: docker.io/eclipse-temurin:21
    container_name: ${COMPOSE_PROJECT_NAME:-app}-java
    working_dir: /app
    volumes:
      - .:/app:Z
      - maven-cache:/root/.m2
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - JAVA_OPTS=-Xmx512m
    command: java -jar target/app.jar
