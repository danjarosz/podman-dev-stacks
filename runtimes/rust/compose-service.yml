
  app:
    image: docker.io/rust:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}-rust
    working_dir: /app
    volumes:
      - .:/app:Z
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - RUST_LOG=${RUST_LOG:-debug}
      - RUST_BACKTRACE=1
    command: cargo run
