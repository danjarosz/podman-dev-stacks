
  app:
    image: docker.io/node:lts
    container_name: ${COMPOSE_PROJECT_NAME:-app}-node
    working_dir: /app
    volumes:
      - .:/app:Z
      - node_modules:/app/node_modules
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    command: npm run dev
